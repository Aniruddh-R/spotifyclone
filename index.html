<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>'Spotify - Web Player: Music for everyone'</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="utility.css" />
    <link
      rel="stylesheet"
      href="https://sets.hugeicons.com/YOUR-SET-ID.css"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- <img src="logo.svg" alt="" /> -->
    <div class="container flex bg-black">
      <div class="left">
        <div class="close">
          <img width="30px" class="invert" src="close.svg" alt="" />
        </div>
        <div class="home bg-grey rounded m-1 p-1">
          <div class="logo">
            <img width="200px" class="" src="logochange.svg" alt="logo" />
          </div>
          <ul>
            <li><img class="invert" src="home.svg" alt="home" />Home</li>
            <li><img class="invert" src="search.svg" alt="search" />search</li>
          </ul>
        </div>
        <div class="library bg-grey rounded m-1 p-1">
          <div class="heading">
            <img class="invert" src="playlist.svg" alt="play" />
            <h2>Library</h2>
          </div>
          <div class="songlist">
            <ul>
              <li>
                <img class="" src="music.svg" alt="musiclogo" />
                <div class="info">
                  <div>Song Name</div>
                  <div>Song Artist</div>
                </div>
                <span class="playnow">Play Now</span>
                <img src="play.svg " alt="" />
              </li>
            </ul>
          </div>
          <div class="footer">
            <div>
              <a href="https://www.spotify.com/in-en/legal/"
                ><span>Legal</span></a
              >
            </div>

            <div>
              <a href="https://www.spotify.com/in-en/safetyandprivacy/">
                <span>Safety &amp; Privacy Center</span>
              </a>
            </div>

            <div>
              <a href="https://www.spotify.com/in-en/legal/privacy-policy/">
                <span>Privacy Policy</span>
              </a>
            </div>

            <div>
              <a href="https://www.spotify.com/in-en/legal/cookies-policy/">
                <span>Cookies</span>
              </a>
            </div>

            <div>
              <a href="https://www.spotify.com/in-en/legal/privacy-policy/#s3">
                <span>About Ads</span>
              </a>
            </div>

            <div>
              <a href="https://www.spotify.com/in-en/accessibility/">
                <span>Accessibility</span>
              </a>
            </div>
          </div>
        </div>
      </div>
      <div class="right bg-grey rounded p-1">
        <div class="header">
          <div class="nav">
            <div class="hamburgercontainer">
              <img width="60px" class="hamburger" src="hamburger.svg" alt="" />

              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="24"
                height="24"
                color="#ffffff"
                fill="none"
                stroke="#fff"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18"
                /></svg
              ><svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="24"
                height="24"
                color="#ffffff"
                fill="none"
                stroke="#fff"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18"
                />
              </svg>
            </div>
          </div>
          <div class="buttons">
            <button class="signupbtn">Sign Up</button>
            <button class="loginbtn">Log in</button>
          </div>
        </div>
        <div class="spotifyplaylists">
          <h1>Spotify Playlists</h1>
          <div class="cardContainer">
            <div data-folder="english" class="card">
              <div class="play">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="-2 -2 28 28"
                  width="80"
                  height="80"
                  color="#000"
                  fill="#3be477"
                  stroke="#3be477"
                  stroke-width="1.5"
                >
                  <circle cx="12" cy="12" r="10" />
                  <path
                    d="M9.5 11.1998V12.8002C9.5 14.3195 9.5 15.0791 9.95576 15.3862C10.4115 15.6932 11.0348 15.3535 12.2815 14.6741L13.7497 13.8738C15.2499 13.0562 16 12.6474 16 12C16 11.3526 15.2499 10.9438 13.7497 10.1262L12.2815 9.32594C11.0348 8.6465 10.4115 8.30678 9.95576 8.61382C9.5 8.92086 9.5 9.6805 9.5 11.1998Z"
                    fill="currentColor"
                  />
                </svg>
              </div>
              <img
                src="https://mosaic.scdn.co/300/ab67616d00001e021192ae62dfe52262a3cc3fedab67616d00001e021b11100917617bd2a75396afab67616d00001e02459d675aa0b6f3b211357370ab67616d00001e02626fb1736f04466054ff7dd4"
                alt="first song"
              />
              <h2>English Songs</h2>
              <p>Most PLayed</p>
            </div>
            <div data-folder="hindi" class="card">
              <div class="play">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="-2 -2 28 28"
                  width="80"
                  height="80"
                  color="#000"
                  fill="#3be477"
                  stroke="#3be477"
                  stroke-width="1.5"
                >
                  <circle cx="12" cy="12" r="10" />
                  <path
                    d="M9.5 11.1998V12.8002C9.5 14.3195 9.5 15.0791 9.95576 15.3862C10.4115 15.6932 11.0348 15.3535 12.2815 14.6741L13.7497 13.8738C15.2499 13.0562 16 12.6474 16 12C16 11.3526 15.2499 10.9438 13.7497 10.1262L12.2815 9.32594C11.0348 8.6465 10.4115 8.30678 9.95576 8.61382C9.5 8.92086 9.5 9.6805 9.5 11.1998Z"
                    fill="currentColor"
                  />
                </svg>
              </div>
              <img
                src="https://mosaic.scdn.co/300/ab67616d00001e02051fe40d22813af67a3391d7ab67616d00001e0215bdb7a86250e53e8a80163dab67616d00001e022432edc97b465e6db54d356bab67616d00001e023e841e7cac60d1a9e580fc94"
                alt="first song"
              />
              <h2>Hindi Playlist</h2>
              <p>Played List</p>
            </div>
            <div data-folder="kannada" class="card">
              <div class="play">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="-2 -2 28 28"
                  width="80"
                  height="80"
                  color="#000"
                  fill="#3be477"
                  stroke="#3be477"
                  stroke-width="1.5"
                >
                  <circle cx="12" cy="12" r="10" />
                  <path
                    d="M9.5 11.1998V12.8002C9.5 14.3195 9.5 15.0791 9.95576 15.3862C10.4115 15.6932 11.0348 15.3535 12.2815 14.6741L13.7497 13.8738C15.2499 13.0562 16 12.6474 16 12C16 11.3526 15.2499 10.9438 13.7497 10.1262L12.2815 9.32594C11.0348 8.6465 10.4115 8.30678 9.95576 8.61382C9.5 8.92086 9.5 9.6805 9.5 11.1998Z"
                    fill="currentColor"
                  />
                </svg>
              </div>
              <img
                src="https://mosaic.scdn.co/300/ab67616d00001e02126a9628265feede5a1e1598ab67616d00001e0215bee6c58181618c6d1d149eab67616d00001e024583bbdd295d3d1cd2c9e0d7ab67616d00001e02b1b91dada2116e84b1b69806"
                alt="first song"
              />
              <h2>Kannada Songs</h2>
              <p>Favourites of all time</p>
            </div>
          </div>

          <div class="playbar">
            <div class="seekbar">
              <div class="circle"></div>
            </div>
            <div class="abovebar">
              <div class="songinfo"></div>
              <div class="songbuttons">
                <img width="35px" id="previous" src="previous.svg" alt="prev" />
                <img width="35px" id="play" src="play.svg" alt="play" />
                <img width="35px" id="next" src="next.svg" alt="next" />
              </div>
              <div class="timevol">
                <div class="songtime"></div>
                <div class="volume">
                  <img src="volume.svg" alt="vol" />
                  <input type="range" name="volume" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="scriptcheck.js"></script>
  </body>
</html>
